<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arvelys RP</title>

<style>

body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

header{
    padding:50px 20px;
}

.logo{
    width:180px;
}

h1{
    color:#d4af37;
    font-size:60px;
    margin:20px 0 10px;
}

.subtitle{
    font-size:28px;
}

.hero{
    max-width:1400px;
    margin:0 auto 50px auto;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #333;
}

.hero img{
    width:100%;
    display:block;
}

.menu{
    max-width:800px;
    margin:0 auto 60px auto;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

.btn{
    background:#181818;
    border:1px solid #333;
    border-radius:12px;

    color:#d4af37;
    text-decoration:none;

    font-size:34px;
    font-weight:bold;

    padding:35px 15px;

    transition:0.2s;
}

.btn:hover{
    background:#222;
    border-color:#d4af37;
}

footer{
    color:#777;
    padding:30px;
}

@media(max-width:900px){

    .menu{
        grid-template-columns:1fr;
    }

    h1{
        font-size:42px;
    }

    .subtitle{
        font-size:20px;
    }
}

</style>
</head>

<body>

<header>

<img src="ecuarvelys.png" class="logo">

<h1>Arvelys RP</h1>

<div class="subtitle">
Serveur SCUM RP francophone
</div>

</header>

<div class="hero">
    <img src="arvelys_roleplay_baniere.png" alt="Arvelys RP">
</div>

<div class="menu">

<a href="#" class="btn">Présentation</a>

<a href="#" class="btn">Lore</a>

<a href="#" class="btn">Informations</a>

<a href="#" class="btn">ZDND</a>

<a href="#" class="btn">Règlement</a>

<a href="#" class="btn">Connexion</a>

</div>

<footer>
© Arvelys RP
</footer>

</body>
</html>
