<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arvelys RP</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.hero{
    max-width:1500px;
    margin:35px auto 55px;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #333;
}

.hero img{
    display:block;
    width:100%;
    height:auto;
}

.menu{
    max-width:1000px;
    margin:0 auto 65px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:90px 90px;
    column-gap:45px;
    row-gap:35px;
    padding:0 20px;
}

.menu a{
    display:flex;
    justify-content:center;
    align-items:center;
    width:100%;
    height:90px;
    text-decoration:none;
}

.menu img{
    max-width:100%;
    max-height:70px;
    object-fit:contain;
    display:block;
    transition:0.2s ease;
}

.menu a:hover img{
    transform:scale(1.06);
    filter:drop-shadow(0 0 14px rgba(212,175,55,0.75));
}

footer{
    color:#777;
    padding:25px;
    font-size:14px;
}

@media(max-width:900px){
    .hero{
        margin:20px auto 35px;
        border-radius:0;
        border-left:0;
        border-right:0;
    }

    .menu{
        grid-template-columns:1fr;
        grid-template-rows:none;
        gap:22px;
    }

    .menu a{
        height:75px;
    }

    .menu img{
        max-height:60px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="arvelys_roleplay_fr_site.png" alt="Arvelys Roleplay">
</div>

<main class="menu">

    <a href="presentation.html">
        <img src="presentation_site.png" alt="Présentation">
    </a>

    <a href="lore.html">
        <img src="lore_site.png" alt="Lore">
    </a>

    <a href="informations.html">
        <img src="informations_site.png" alt="Informations">
    </a>

    <a href="zdnd.html">
        <img src="zdnd_site.png" alt="ZDND">
    </a>

    <a href="reglement.html">
        <img src="reglement_site.png" alt="Règlement">
    </a>

    <a href="connexion.html">
        <img src="connexion_site.png" alt="Connexion">
    </a>

</main>

<footer>
    © Arvelys RP
</footer>

</body>
</html>
