<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arvelys RP</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.hero{
    max-width:1500px;
    margin:35px auto 55px;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #333;
}

.hero img{
    display:block;
    width:100%;
    height:auto;
}

.menu{
    max-width:1050px;
    margin:0 auto 65px;
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:32px 45px;
    padding:0 20px;
}

.menu a{
    height:75px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
}

.menu img{
    max-width:100%;
    max-height:64px;
    object-fit:contain;
    display:block;
    transition:0.2s ease;
}

/* Correction fine d'alignement */
.presentation{ transform:translateY(3px); }
.lore{ transform:translateY(5px); }
.informations{ transform:translateY(3px); }

.zdnd{ transform:translateY(5px); }
.reglement{ transform:translateY(3px); }
.connexion{ transform:translateY(3px); }

.menu a:hover img{
    filter:drop-shadow(0 0 14px rgba(212,175,55,0.75));
}

.menu a:hover .presentation{ transform:translateY(3px) scale(1.06); }
.menu a:hover .lore{ transform:translateY(3px) scale(1.06); }
.menu a:hover .informations{ transform:translateY(3px) scale(1.06); }

.menu a:hover .zdnd{ transform:translateY(3px) scale(1.06); }
.menu a:hover .reglement{ transform:translateY(3px) scale(1.06); }
.menu a:hover .connexion{ transform:translateY(3px) scale(1.06); }

footer{
    color:#777;
    padding:25px;
    font-size:14px;
}

@media(max-width:900px){
    .hero{
        margin:20px auto 35px;
        border-radius:0;
        border-left:0;
        border-right:0;
    }

    .menu{
        grid-template-columns:1fr;
        gap:22px;
    }

    .menu a{
        height:70px;
    }

    .menu img{
        max-height:58px;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="arvelys_roleplay_fr_site.png" alt="Arvelys Roleplay">
</div>

<main class="menu">

    <a href="presentation.html">
        <img class="presentation" src="presentation_site.png" alt="Présentation">
    </a>

    <a href="lore.html">
        <img class="lore" src="lore_site.png" alt="Lore">
    </a>

    <a href="informations.html">
        <img class="informations" src="informations_site.png" alt="Informations">
    </a>

    <a href="zdnd.html">
        <img class="zdnd" src="zdnd_site.png" alt="ZDND">
    </a>

    <a href="reglement.html">
        <img class="reglement" src="reglement_site.png" alt="Règlement">
    </a>

    <a href="connexion.html">
        <img class="connexion" src="connexion_site.png" alt="Connexion">
    </a>

</main>

<footer>
    © Arvelys RP
</footer>

</body>
</html>
