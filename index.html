<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arvelys RP</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    background:
        linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
        url("carbone_site.png");

    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    font-family:Georgia, serif;
    color:white;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.banner{
    margin-top:40px;
}

.banner img{
    width:970px;
    max-width:95vw;

    border-radius:12px;

    box-shadow:
        0 0 20px rgba(0,0,0,0.5);
}

.menu{
    margin-top:55px;

    display:grid;

    grid-template-columns:
        repeat(3, auto);

    gap:60px 90px;

    justify-content:center;
    align-items:center;
}

.menu a{
    text-decoration:none;
}

.menu img{
    height:52px;
    width:auto;

    transition:
        transform 0.25s ease,
        filter 0.25s ease;
}

.menu img:hover{
    transform:scale(1.05);

    filter:
        drop-shadow(0 0 12px rgba(255,215,0,0.90))
        drop-shadow(0 0 20px rgba(255,215,0,0.60));
}

footer{

    margin-top:90px;

    margin-bottom:25px;

    color:#555;

    font-size:12px;

    text-align:center;
}

</style>
</head>

<body>

<div class="banner">
    <img src="arvelys_roleplay_fr_site.png" alt="Arvelys RP">
</div>

<div class="menu">

    <a href="presentation.html">
        <img src="presentation_site.png" alt="Présentation">
    </a>

    <a href="lore.html">
        <img src="lore_site.png" alt="Lore">
    </a>

    <a href="informations.html">
        <img src="informations_site.png" alt="Informations">
    </a>

    <a href="zdnd.html">
        <img src="zdnd_site.png" alt="ZDND">
    </a>

    <a href="reglement.html">
        <img src="reglement_site.png" alt="Règlement">
    </a>

    <a href="connexion.html">
        <img src="connexion_site.png" alt="Connexion">
    </a>

</div>

<footer>
    © Arvelys RP
</footer>

</body>
</html>
