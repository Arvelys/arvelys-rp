<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Arvelys RP</title>

<style>
body{
    margin:0;
    min-height:100vh;
    background:#0b0b0b;
    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.hero{
    max-width:1500px;
    margin:40px auto 45px;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #333;
}

.hero img{
    display:block;
    width:100%;
    height:auto;
}

.menu{
    max-width:900px;
    margin:0 auto 60px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
    padding:0 20px;
}

.menu a{
    background:#181818;
    border:1px solid #333;
    border-radius:12px;
    color:#d4af37;
    text-decoration:none;
    font-size:26px;
    font-weight:bold;
    padding:28px 15px;
    transition:0.2s;
}

.menu a:hover{
    background:#222;
    border-color:#d4af37;
    color:white;
    transform:translateY(-3px);
}

footer{
    color:#777;
    padding:25px;
}

@media(max-width:900px){
    .hero{
        margin:20px auto 30px;
        border-radius:0;
        border-left:0;
        border-right:0;
    }

    .menu{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<div class="hero">
    <img src="arvelys_roleplay_fr_site.png" alt="Arvelys Roleplay">
</div>

<main class="menu">
    <a href="presentation.html">Présentation</a>
    <a href="lore.html">Lore</a>
    <a href="informations.html">Informations</a>
    <a href="zdnd.html">ZDND</a>
    <a href="reglement.html">Règlement</a>
    <a href="connexion.html">Connexion</a>
</main>

<footer>
    © Arvelys RP
</footer>

</body>
</html>
