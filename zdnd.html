<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZDND - Arvelys RP</title>

<style>
body{
    margin:0;
    min-height:100vh;

    background-color:#030303;
    background-image:
        linear-gradient(rgba(0,0,0,0.48), rgba(0,0,0,0.48)),
        url('carbone_site.png');
    background-repeat:repeat;

    color:white;
    font-family:Arial, sans-serif;
    text-align:center;
}

.page{
    max-width:1200px;
    margin:0 auto;
    padding:60px 20px 30px;
}

.back{
    display:inline-block;
    margin-bottom:45px;
    color:#d4af37;
    text-decoration:none;
    font-size:18px;
    transition:0.2s ease;
}

.back:hover{
    filter:drop-shadow(0 0 10px rgba(212,175,55,0.75));
    transform:scale(1.04);
}

.title{
    margin:0;
    color:#d4af37;
    font-size:52px;
    font-weight:bold;
    letter-spacing:2px;
    text-transform:uppercase;
    text-shadow:0 0 14px rgba(212,175,55,0.35);
}

.page-banner{
    display:block;
    width:850px;
    max-width:90%;
    height:auto;
    margin:20px auto 10px auto;
}
    
.subtitle{
    margin-top:15px;
    color:#c9c9c9;
    font-size:20px;
}

.card{
    margin-top:50px;
    background:rgba(10,10,10,0.72);
    border:1px solid rgba(212,175,55,0.28);
    border-radius:14px;
    padding:50px;
}

.placeholder{
    color:#777;
    font-size:22px;
    line-height:1.8;
}

footer{
    color:#444;
    font-size:12px;
    text-align:center;
    margin-top:150px;
    padding-bottom:25px;
}

@media(max-width:900px){

    .title{
        font-size:38px;
    }

    .subtitle{
        font-size:18px;
    }

    .card{
        padding:30px;
    }

    .placeholder{
        font-size:18px;
    }
}
</style>
</head>

<body>

<div class="page">

    <a class="back" href="index.html">← Retour à l'accueil</a>

    <img src="zdnd_site.png"
     alt="Zones de Non Droit"
     class="page-banner">

    <p class="subtitle">
        Cartographie officielle des ZDND du serveur
    </p>

    <div class="card">

        <div class="placeholder">
            📍 Les captures d'écran des ZDND seront ajoutées prochainement.
            <br><br>
            Cette page présentera l'ensemble des zones de non droit du serveur
            ainsi que leurs limites visibles.
        </div>

    </div>

    <div style="margin-top:60px;">
        <a class="back" href="index.html">← Retour à l'accueil</a>
    </div>

</div>

<footer>

<footer>
    © Arvelys RP
</footer>

</body>
</html>
